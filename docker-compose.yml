services:
  postgres:
    image: postgres:16-alpine
    container_name: carbon-coach-postgres
    environment:
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
      POSTGRES_DB: carbon_coach
    ports:
      - "5432:5432"
    volumes:
      - carbon_coach_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon -d carbon_coach"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: carbon-coach-backend
    environment:
      DATABASE_URL: postgresql://carbon:carbon@postgres:5432/carbon_coach?schema=public
      JWT_SECRET: local-dev-carbon-coach-secret-change-me
      GEMINI_API_KEY: ""
      GEMINI_MODEL: gemini-1.5-flash
      PORT: 4000
      NODE_ENV: development
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
        VITE_APP_NAME: Carbon Coach
    container_name: carbon-coach-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  carbon_coach_pg:

